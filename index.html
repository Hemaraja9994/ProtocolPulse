<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthicShield AI | National Ethics Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <!-- PDF.js for reading PDF content -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); }
        .active-tab { border-left: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 glass border-r border-slate-800 flex flex-col hidden md:flex">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-tighter text-white flex items-center gap-2">
                <span class="text-blue-500">◈</span> EthicShield
            </h1>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">National AI Assistant</p>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button onclick="showPage('audit')" id="tab-audit" class="sidebar-item active-tab w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium">New Audit</button>
            <button onclick="showPage('archive')" id="tab-archive" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-slate-400 text-left">Cloud Archive</button>
        </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="p-6 flex justify-between items-center glass sticky top-0 z-10">
            <h2 id="pageTitle" class="text-xl font-bold text-white">Live Ethical Review</h2>
            <div id="statusIndicator" class="text-xs font-bold text-blue-400 uppercase tracking-widest">System Ready</div>
        </header>

        <!-- Audit Page -->
        <div id="auditPage" class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Side: Input -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-6 rounded-3xl space-y-4">
                    <h3 class="text-xs font-bold uppercase text-slate-500">Metadata</h3>
                    <input type="text" id="institute" placeholder="Institute Name" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none">
                    <input type="text" id="reviewerName" placeholder="Reviewer Name" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none">
                    <select id="designation" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none">
                        <option>Member Secretary</option>
                        <option>Chairperson</option>
                        <option>Scientific Member</option>
                    </select>

                    <div class="pt-4 border-t border-slate-800">
                        <label class="block text-xs text-slate-400 mb-2">Protocol Package (PDFs)</label>
                        <div id="dropZone" class="border-2 border-dashed border-slate-700 hover:border-blue-500 rounded-2xl p-6 text-center cursor-pointer transition">
                            <p class="text-[10px] text-slate-500">Click to upload Protocol, ICF, CVs</p>
                            <input type="file" id="fileInput" multiple accept="application/pdf" class="hidden">
                        </div>
                        <!-- File List View -->
                        <div id="fileList" class="mt-3 space-y-2"></div>
                        
                        <button onclick="processDocuments()" id="analyzeBtn" class="w-full mt-6 btn-primary text-white py-4 rounded-2xl font-bold shadow-lg transform active:scale-95 transition">
                            Start AI Analysis
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side: Results -->
            <div class="lg:col-span-8">
                <div id="placeholder" class="h-64 flex flex-col items-center justify-center opacity-20 border-2 border-dashed border-slate-800 rounded-3xl">
                    <p>No results to display yet.</p>
                </div>

                <div id="results" class="hidden space-y-6">
                    <!-- Progress / Risk Header -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="glass p-6 rounded-3xl border-l-4 border-blue-500">
                            <p class="text-[10px] uppercase text-slate-400 font-bold">Recommended Category</p>
                            <h2 id="riskBadge" class="text-2xl font-black text-white italic">---</h2>
                        </div>
                        <div class="glass p-6 rounded-3xl border-l-4 border-purple-500">
                            <p class="text-[10px] uppercase text-slate-400 font-bold">Compliance Score</p>
                            <h2 id="complianceScore" class="text-2xl font-black text-white">0%</h2>
                        </div>
                    </div>

                    <!-- Visuals -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="glass p-6 rounded-3xl h-64 flex justify-center">
                            <canvas id="complianceChart"></canvas>
                        </div>
                        <div id="checklistItems" class="glass p-6 rounded-3xl space-y-3 overflow-y-auto max-h-64"></div>
                    </div>

                    <div class="glass p-6 rounded-3xl">
                        <h4 class="text-sm font-bold text-blue-400 mb-2">Executive Summary</h4>
                        <p id="aiSummary" class="text-sm text-slate-300 leading-relaxed"></p>
                        <button onclick="downloadPDF()" class="mt-4 px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold transition">Download Official Report</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Archive Page -->
        <div id="archivePage" class="hidden p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="archiveGrid"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
